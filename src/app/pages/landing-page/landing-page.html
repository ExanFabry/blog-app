<div class="page">
    <app-navbar></app-navbar>
    <section class="introduction">
        <h1>Exan Fabry - Full Stack Developer</h1>
        <p>
            This is a simple blog application built with Angular for sharing my internship experience at AP Hogeschool.
            Here, I will share insights, challenges, and lessons learned during my internship.
        </p>
    </section>
    <section class="post">
        <h2>Latest Blog Post</h2>
        <section class="blog-post">
            <p class="week">Week {{ posts.length }}</p>
            <p [innerHTML]="formatText(posts[posts.length - 1][0][0])"></p>
            <a [routerLink]="['/blog', posts.length - 1]">Lees meer</a>
        </section>
    </section>
</div>
